server:
  port: 8187
  servlet:
    context-path: /kafka-streams-service

spring:
  application:
    name: kafka-streams-service
  cloud:
    config:
      uri: http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}

kafka-config:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  schema-registry-url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
  topic-name: ${KAFKA_TOPIC_NAME:twitter-topic}
  topic-names-to-create:
    - insurance-policy-counts-topic

kafka-streams:
  application-id: insurance-policy-streams
  state-dir: /tmp/kafka-streams/insurance

eureka:
  client:
    service-url:
      defaultZone: http://${DISCOVERY_USERNAME:guest}:${DISCOVERY_PASSWORD:guest}@${DISCOVERY_HOST:localhost}:${DISCOVERY_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.microservices.demo: INFO
    org.apache.kafka: WARN
